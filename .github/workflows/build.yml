################################################################################
# Save-state dev build.
# Targets the "none" variant (all coprocessors OFF): it fits the Cyclone V with
# plenty of headroom for the save-state logic, and runs all standard (non-chip)
# games -> our "simple games first" target.
# Run manually via the Actions tab (workflow_dispatch).
################################################################################
# WARNING: repo Actions permissions must allow "Read and write permissions".
name: Build (none / savestate dev)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synthesis:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # "main" is just the artifact label; it is built from the `none`
        # bitstream variant (see generate.tcl) so it drops into Ivalice.SNES
        # as snes_main.rev.
        core: ["main"]

    steps:
      - name: "🧰 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🧰 Checkout Packybara"
        uses: actions/checkout@v4
        with:
          repository: "agg23/pocketpublish"
          path: ".github/publish"

      - name: "🏗️ Compile design (none variant)"
        shell: bash
        run: |
          build_type="none"
          cmd="docker run --rm -v ${{ github.workspace }}:/build raetro/quartus:21.1 quartus_sh -t generate.tcl $build_type"
          echo "Running command: $cmd"
          eval $cmd

      - name: Upload failure artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure_output_files
          path: projects/output_files/

      - name: Reverse bitstream
        shell: bash
        run: |
          mkdir artifacts
          pip3 install -r .github/publish/requirements.txt
          python3 .github/publish/reverse.py projects/output_files/snes_pocket.rbf artifacts/snes_${{ matrix.core }}.rev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snes_${{ matrix.core }}
          path: artifacts/snes_${{ matrix.core }}.rev
